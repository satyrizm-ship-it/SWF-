<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWF 자수기 설치 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide React -->
    <script src="https://unpkg.com/lucide-react@0.292.0/dist/umd/lucide-react.min.js"></script>

    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f3f4f6;
      }
      /* Custom Scrollbar Hide */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in {
        animation: fade-in 0.3s ease-out forwards;
      }
      @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up {
        animation: fade-in-up 0.3s ease-out forwards;
      }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react,typescript">
        const { useState, useEffect, useRef, useMemo } = React;
        const lucideReact = window.lucideReact || window.lucide;
        const {  
            Menu, Lock, X, RefreshCw, Cloud, AlertTriangle, Bell, BarChart2, ChevronRight, AlertCircle, 
            Wrench, Plus, ArrowRight, MapPin, Phone, Mail, Building2, User, Printer, Paperclip, Upload, 
            CheckCircle2, FileSpreadsheet, Download, Filter, ListFilter, Edit2, Loader2, Image: ImageIcon, 
            ChevronLeft, Calendar, List, Trash2 
        } = lucideReact;

        // --- TYPES ---
        // Enums need to be defined manually or let Babel handle TS enums
        enum Priority {
          HIGH = '경고',
          MEDIUM = '주의',
          LOW = '관심',
          NORMAL = '안정',
        }

        enum IssueGrade {
          INQUIRY = '문의',
          MINOR = '경미',
          MAJOR = '중대',
          CRITICAL = '치명'
        }

        enum ServiceType {
          AS = 'A/S',
          BS = 'B/S',
        }

        enum ServiceStatus {
          RESOLVED = 'Resolved',
          PENDING = 'Pending',
          SCHEDULED = 'Scheduled'
        }

        // --- CONSTANTS ---
        const MOCK_DATA = [
          {
            id: 'c1',
            name: '글로벌 스티치 (Global Stitch Corp)',
            representative: '김철수',
            address: '서울특별시 금천구 가산동 123-45',
            contactEmail: 'contact@globalstitch.com',
            contactPhone: '02-1234-5678',
            priority: Priority.HIGH,
            machines: [
              {
                id: 'm1',
                modelName: 'SWF/K-UH1204-45',
                serialNumber: 'SN-998231',
                installDate: '2025-01-12',
                warrantyStatus: 'Active',
                imageUrl: 'https://picsum.photos/400/300?random=1'
              },
              {
                id: 'm2',
                modelName: 'SWF/MA-6',
                serialNumber: 'SN-445210',
                installDate: '2022-05-14',
                warrantyStatus: 'Expired',
                imageUrl: 'https://picsum.photos/400/300?random=2'
              }
            ],
            serviceHistory: [
              {
                id: 's1',
                date: '2025-02-12',
                type: ServiceType.AS,
                machineId: 'm1',
                machineModel: 'SWF/K-UH1204-45',
                issue: '바늘 센서 오작동',
                resolution: '센서 부품 #442 교체 및 타이밍 재조정',
                technician: '박지성',
                status: ServiceStatus.RESOLVED
              },
              {
                id: 's2',
                date: '2023-12-05',
                type: ServiceType.BS,
                machineId: 'm1',
                machineModel: 'SWF/K-UH1204-45',
                issue: '정기 점검 (3개월)',
                resolution: '오일링 및 텐션 조절',
                technician: '김민재',
                status: ServiceStatus.RESOLVED
              }
            ]
          }
        ];

        // --- SERVICES ---
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz_A2v15fR8Ra0sTYJAm28pgXn9gqJ6uiP7CyI0Zqt2KyqjqLVwYgFrQk6EBp_jSDrz/exec';

        const fetchCompaniesFromSheet = async () => {
          try {
            const url = `${SCRIPT_URL}?mode=data&t=${new Date().getTime()}`;
            const response = await fetch(url, { method: 'GET' });
            if (!response.ok) {
              console.warn('GET response not ok:', response.status);
              return [];
            }
            const json = await response.json();
            return json;
          } catch (error) {
            console.warn("Fetch Error (GET):", error);
            return [];
          }
        };

        const saveInstallationToSheet = async (formData) => {
          try {
            const payload = {
              action: 'installation',
              company: formData.company,   
              model: formData.model,
              serial: formData.serial, 
              date: formData.date,   
              installer: formData.installer,
              photo: formData.photo
            };
            const response = await fetch(SCRIPT_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify(payload)
            });
            if (!response.ok) return false;
            const result = await response.json();
            return result.result === 'success';
          } catch (error) {
            console.error("Fetch Error (POST Install):", error);
            return false;
          }
        };

        const saveServiceToSheet = async (serviceData) => {
          try {
            const payload = {
              action: 'service',
              id: serviceData.id,
              date: serviceData.date,
              type: serviceData.type,
              company: serviceData.company,
              model: serviceData.model,
              serial: serviceData.serial,
              issue: serviceData.issue,
              resolution: serviceData.resolution,
              technician: serviceData.technician,
              priority: serviceData.priority,
              photo: serviceData.photo || ''
            };
            const response = await fetch(SCRIPT_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify(payload)
            });
            if (!response.ok) return false;
            const result = await response.json();
            return result.result === 'success';
          } catch (error) {
            console.error("Fetch Error (POST Service):", error);
            return false;
          }
        };

        const updateServiceInSheet = async (serviceData) => {
          try {
            const payload = {
              action: 'update_service',
              id: serviceData.id,
              date: serviceData.date,
              type: serviceData.type,
              issue: serviceData.issue,
              resolution: serviceData.resolution,
              technician: serviceData.technician,
              priority: serviceData.priority,
              photo: serviceData.photo || ''
            };
            const response = await fetch(SCRIPT_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify(payload)
            });
            if (!response.ok) return false;
            const result = await response.json();
            return result.result === 'success';
          } catch (error) {
            console.error("Fetch Error (POST Update Service):", error);
            return false; 
          }
        };

        const deleteServiceFromSheet = async (serviceId) => {
          try {
            const payload = {
              action: 'delete_service',
              id: serviceId
            };
            const response = await fetch(SCRIPT_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify(payload)
            });
            if (!response.ok) return false;
            const result = await response.json();
            return result.result === 'success';
          } catch (error) {
            console.error("Fetch Error (POST Delete Service):", error);
            return false;
          }
        };

        const deleteMachineFromSheet = async (machineId) => {
          try {
            const payload = {
              action: 'delete_machine',
              id: machineId
            };
            const response = await fetch(SCRIPT_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify(payload)
            });
            if (!response.ok) return false;
            const result = await response.json();
            return result.result === 'success';
          } catch (error) {
            console.error("Fetch Error (POST Delete Machine):", error);
            return false;
          }
        };

        const updateMonthlyScheduleInSheet = async (scheduleData) => {
          try {
            const payload = {
              action: 'update_monthly_schedule',
              id: scheduleData.id,
              rowIndex: scheduleData.rowIndex,
              model: scheduleData.model,
              serial: scheduleData.serial,
              company: scheduleData.company,
              region: scheduleData.region,
              installer: scheduleData.installer,
              date: scheduleData.date,
              status: scheduleData.status,
              note: scheduleData.note,
              photo: scheduleData.photo || ''
            };
            const response = await fetch(SCRIPT_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify(payload)
            });
            if (!response.ok) return false;
            const result = await response.json();
            return result.result === 'success';
          } catch (error) {
            console.error("Fetch Error (POST Update Monthly Schedule):", error);
            return false;
          }
        };

        const updateCompanyInSheet = async (companyData) => {
          try {
            const payload = {
              action: 'update_company',
              originalName: companyData.originalName,
              name: companyData.name,
              representative: companyData.representative,
              address: companyData.address,
              phone: companyData.contactPhone,
              email: companyData.contactEmail,
              phone2: companyData.contactPhone2,
              note: companyData.note
            };
            const response = await fetch(SCRIPT_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify(payload)
            });
            if (!response.ok) return false;
            const result = await response.json();
            return result.result === 'success';
          } catch (error) {
            console.error("Fetch Error (POST Update Company):", error);
            return false;
          }
        };

        // --- COMPONENTS ---
        
        const MonthlyScheduleModal = ({ 
          isOpen, 
          onClose, 
          schedules,
          targetYear,
          targetMonth,
          isAdminMode
        }) => {
          if (!isOpen) return null;

          const getStatusStyle = (status) => {
            const s = status ? status.trim() : '';
            if (s === 'Completed' || s === '완료') return 'bg-green-100 text-green-700 border-green-200';
            if (s === 'Scheduled' || s === '예정') return 'bg-blue-100 text-blue-700 border-blue-200';
            if (s === 'Pending' || s === '보류') return 'bg-gray-100 text-gray-600 border-gray-200';
            return 'bg-gray-50 text-gray-500';
          };

          const getStatusText = (status) => {
            const s = status ? status.trim() : '';
            if (s === 'Completed' || s === '완료') return '완료';
            if (s === 'Scheduled' || s === '예정') return '예정';
            if (s === 'Pending' || s === '보류') return '보류';
            return s;
          };

          const getInitials = (name) => {
            return name ? name.slice(0, 2).toUpperCase() : '?';
          };

          const handleExportCSV = () => {
            if (schedules.length === 0) {
              alert('출력할 데이터가 없습니다.');
              return;
            }

            let csvContent = '\uFEFF';
            csvContent += "MODEL,SN,업체명,지역,설치예정자,설치예정일,완료여부,비고\n";

            schedules.forEach(item => {
              const row = [
                `"${item.model.replace(/"/g, '""')}"`,
                `"${item.serial.replace(/"/g, '""')}"`,
                `"${item.company.replace(/"/g, '""')}"`,
                `"${item.region.replace(/"/g, '""')}"`,
                `"${item.installer.replace(/"/g, '""')}"`,
                `"${item.date}"`,
                `"${item.status}"`,
                `"${(item.note || '').replace(/"/g, '""').replace(/\n/g, ' ')}"`
              ].join(",");
              csvContent += row + "\n";
            });

            const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            if (link.download !== undefined) {
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", `Installation_Schedule_${targetYear}_${targetMonth}.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
          };

          return (
            <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm animate-fade-in p-4">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-6xl overflow-hidden animate-fade-in-up flex flex-col max-h-[90vh]">
                <div className="px-6 py-5 border-b border-gray-100 flex items-start justify-between bg-white">
                  <div>
                    <h2 className="text-xl font-bold text-gray-900">이달의 설치 예정 및 현황</h2>
                    <p className="text-sm text-gray-500 mt-1">{targetYear}년 {targetMonth}월 내수 설치</p>
                  </div>
                  <button 
                    onClick={onClose}
                    className="text-gray-400 hover:text-gray-600 p-1 rounded-full hover:bg-gray-50 transition-colors"
                  >
                    <X size={24} />
                  </button>
                </div>

                <div className="overflow-x-auto flex-1 p-0">
                  <table className="w-full text-left border-collapse whitespace-nowrap">
                    <thead className="bg-gray-50 sticky top-0 z-10">
                      <tr>
                        <th className="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider border-b border-gray-100">MODEL</th>
                        <th className="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider border-b border-gray-100">업체명</th>
                        <th className="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider border-b border-gray-100">지역</th>
                        <th className="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider border-b border-gray-100">설치 예정자</th>
                        <th className="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider border-b border-gray-100">설치 예정일</th>
                        <th className="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider border-b border-gray-100 text-center">완료 여부</th>
                        <th className="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider border-b border-gray-100 text-center">비고</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100 bg-white">
                      {schedules.length > 0 ? (
                        schedules.map((item) => (
                          <tr key={item.id} className="hover:bg-gray-50/80 transition-colors">
                            <td className="px-6 py-4">
                              <div className="flex flex-col">
                                <span className="font-bold text-gray-900 text-sm">{item.model}</span>
                              </div>
                            </td>
                            <td className="px-6 py-4">
                              <span className="text-sm font-semibold text-gray-800">{item.company}</span>
                            </td>
                            <td className="px-6 py-4">
                              <div className="flex items-center text-gray-600 text-sm">
                                {item.region}
                              </div>
                            </td>
                            <td className="px-6 py-4">
                              <div className="flex items-center gap-3">
                                 <span className="text-sm font-medium text-gray-700">{item.installer}</span>
                              </div>
                            </td>
                            <td className="px-6 py-4">
                               <div className="text-sm text-gray-600 font-medium font-mono">
                                 {item.date}
                               </div>
                            </td>
                            <td className="px-6 py-4 text-center">
                              <span className={`inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold border ${getStatusStyle(item.status)}`}>
                                {getStatusText(item.status)}
                              </span>
                            </td>
                            <td className="px-6 py-4 text-center">
                              <span className="text-sm text-gray-500">{item.note}</span>
                            </td>
                          </tr>
                        ))
                      ) : (
                        <tr>
                          <td colSpan={7} className="px-6 py-12 text-center text-gray-500">
                            <div className="flex flex-col items-center">
                              <Calendar size={40} className="text-gray-300 mb-2" />
                              <p>등록된 설치 일정이 없습니다.</p>
                            </div>
                          </td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>

                <div className="px-6 py-4 border-t border-gray-100 bg-white flex items-center justify-between">
                  <span className="text-sm text-gray-500 font-medium">총 {schedules.length}건의 설치 기록</span>
                  <div className="flex gap-3">
                    <button 
                      onClick={onClose}
                      className="px-4 py-2 bg-white border border-gray-200 rounded-lg text-gray-700 text-sm font-medium hover:bg-gray-50 transition-colors"
                    >
                      닫기
                    </button>
                    <button 
                      onClick={handleExportCSV}
                      className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors flex items-center shadow-sm"
                    >
                      <Printer size={16} className="mr-2" />
                      출력하기
                    </button>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        const IntensiveCareModal = ({ isOpen, onClose, companies }) => {
          const [viewMode, setViewMode] = useState('list');
          const [currentDate, setCurrentDate] = useState(new Date());
          const [selectedDateDetails, setSelectedDateDetails] = useState(null);

          const recentInstallations = useMemo(() => {
            const threeMonthsAgo = new Date();
            threeMonthsAgo.setMonth(threeMonthsAgo.getMonth() - 3);
            threeMonthsAgo.setHours(0, 0, 0, 0);

            const list = [];

            companies.forEach(company => {
              company.machines.forEach(machine => {
                const d = new Date(machine.installDate);
                if (!isNaN(d.getTime()) && d >= threeMonthsAgo) {
                  list.push({
                    companyName: company.name,
                    modelName: machine.modelName,
                    installDate: machine.installDate,
                    machineId: machine.id
                  });
                }
              });
            });

            return list.sort((a, b) => new Date(b.installDate).getTime() - new Date(a.installDate).getTime());
          }, [companies]);

          const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
          const getFirstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

          const handlePrevMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));
          const handleNextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));

          const renderCalendar = () => {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const daysInMonth = getDaysInMonth(year, month);
            const firstDay = getFirstDayOfMonth(year, month);
            const days = [];

            for (let i = 0; i < firstDay; i++) {
              days.push(<div key={`empty-${i}`} className="h-14 bg-gray-50/30 border border-gray-100/50"></div>);
            }

            for (let day = 1; day <= daysInMonth; day++) {
              const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
              const installationsOnDate = recentInstallations.filter(item => item.installDate === dateStr);
              const hasInstallation = installationsOnDate.length > 0;

              days.push(
                <div 
                  key={day} 
                  className={`h-14 border border-gray-100 relative flex flex-col items-center justify-start pt-1 transition-colors ${hasInstallation ? 'cursor-pointer hover:bg-green-50' : ''}`}
                  onClick={() => {
                    if (hasInstallation) {
                      setSelectedDateDetails({
                        date: dateStr,
                        items: installationsOnDate.map(i => ({ company: i.companyName, model: i.modelName }))
                      });
                    }
                  }}
                >
                  <span className={`text-sm font-medium ${hasInstallation ? 'z-10 text-green-800' : 'text-gray-700'}`}>
                    {day}
                  </span>
                  {hasInstallation && (
                    <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-8 h-8 bg-green-200/60 rounded-full flex items-center justify-center"></div>
                  )}
                  {hasInstallation && (
                     <div className="absolute bottom-1 text-[10px] font-bold text-green-700 z-10">
                       {installationsOnDate.length}건
                     </div>
                  )}
                </div>
              );
            }
            return days;
          };

          if (!isOpen) return null;

          return (
            <div className="fixed inset-0 z-[80] flex items-center justify-center bg-black/50 backdrop-blur-sm animate-fade-in p-4">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl overflow-hidden animate-fade-in-up flex flex-col max-h-[85vh]">
                <div className="px-6 py-4 border-b border-gray-100 flex items-center justify-between bg-white">
                  <div>
                    <h2 className="text-lg font-bold text-gray-900">3개월 이내 설치 현황</h2>
                    <p className="text-xs text-gray-500 mt-1">집중 관리 대상 기계 목록 및 일정</p>
                  </div>
                  <div className="flex items-center gap-2">
                     <div className="flex bg-gray-100 rounded-lg p-1">
                        <button 
                          onClick={() => setViewMode('list')}
                          className={`p-1.5 rounded-md transition-all ${viewMode === 'list' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500 hover:text-gray-700'}`}
                          title="리스트 보기"
                        >
                          <List size={18} />
                        </button>
                        <button 
                          onClick={() => setViewMode('calendar')}
                          className={`p-1.5 rounded-md transition-all ${viewMode === 'calendar' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500 hover:text-gray-700'}`}
                          title="달력 보기"
                        >
                          <Calendar size={18} />
                        </button>
                     </div>
                     <button 
                      onClick={onClose}
                      className="text-gray-400 hover:text-gray-600 p-1 rounded-full hover:bg-gray-50 transition-colors ml-2"
                    >
                      <X size={24} />
                    </button>
                  </div>
                </div>

                <div className="flex-1 overflow-y-auto p-0 bg-gray-50/50">
                  {viewMode === 'list' ? (
                    <div className="overflow-x-auto">
                      <table className="w-full text-left border-collapse whitespace-nowrap">
                        <thead className="bg-gray-50 sticky top-0 z-10">

            return new Promise((resolve) => {
              const reader = new FileReader();
              reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                  const canvas = document.createElement('canvas');
                  let width = img.width;
                  let height = img.height;
                  const MAX_SIZE = 1024;

                  if (width > height) {
                    if (width > MAX_SIZE) {
                      height *= MAX_SIZE / width;
                      width = MAX_SIZE;
                    }
                  } else {
                    if (height > MAX_SIZE) {
                      width *= MAX_SIZE / height;
                      height = MAX_SIZE;
                    }
                  }

                  canvas.width = width;
                  canvas.height = height;
                  const ctx = canvas.getContext('2d');
                  ctx?.drawImage(img, 0, 0, width, height);
                  resolve(canvas.toDataURL('image/jpeg', 0.6));

                img.src = e.target?.result;

  companies,

}) => {
  const { Search } = lucideReact;

  const getElapsedDays = (dateStr) => {
    if (!dateStr) return 0;
    const start = new Date(dateStr).getTime();
    if (isNaN(start)) return 0; 
    const now = new Date().getTime();
    const diff = now - start;
    return Math.floor(diff / (1000 * 60 * 60 * 24));
  };

  const [searchTerm, setSearchTerm] = useState('');
  const [filterPriority, setFilterPriority] = useState('All');
  const [isScheduleModalOpen, setIsScheduleModalOpen] = useState(false);
  const [isIntensiveCareModalOpen, setIsIntensiveCareModalOpen] = useState(false);
  const [currentPage, setCurrentPage] = useState(1);
  const ITEMS_PER_PAGE = 5;
  
  // 2026년도 설치 현황 계산 (Dashboard Card)
  const targetYear = '2026';
  const yearInstallations = useMemo(() => {
    return companies.reduce((acc, company) => {
      const count = company.machines ? company.machines.filter(m => m.installDate && m.installDate.startsWith(targetYear)).length : 0;
      return acc + count;
    }, 0);
  }, [companies]);

  // 3개월 이내 설치 현황 (기존 로직 유지)
  const recentInstallations = useMemo(() => {
    return companies.reduce((acc, company) => {
      const recentMachines = company.machines ? company.machines.filter(m => {
        const days = getElapsedDays(m.installDate);
        return days <= 90;
      }) : [];
      return acc + recentMachines.length;
    }, 0);
  }, [companies]);

  const statusCounts = useMemo(() => {
    let high = 0;
    let medium = 0;
    let low = 0;
    let normal = 0;

    companies.forEach(company => {
      if (!company.machines) return;
      
      company.machines.forEach(m => {
        const days = getElapsedDays(m.installDate);
        if (days <= 90) {
          const machineHistory = company.serviceHistory ? company.serviceHistory.filter(r => r.machineId === m.id) : [];
          
          let totalCritical = 0;
          let totalMajor = 0;
          let totalMinor = 0;

          machineHistory.forEach(record => {
            if (record.priority === IssueGrade.CRITICAL) totalCritical++;
            if (record.priority === IssueGrade.MAJOR) totalMajor++;
            if (record.priority === IssueGrade.MINOR) totalMinor++;
          });

          let currentPriority = Priority.NORMAL;
          if (totalMajor >= 2 || totalCritical >= 1) {
            currentPriority = Priority.HIGH;
          } else if (totalMinor >= 3 || totalMajor >= 1) {
            currentPriority = Priority.MEDIUM;
          } else if (totalMinor >= 2) {
            currentPriority = Priority.LOW;
          }
          
          if (currentPriority === Priority.HIGH) high++;
          else if (currentPriority === Priority.MEDIUM) medium++;
          else if (currentPriority === Priority.LOW) low++;
          else normal++;
        }
      });
    });

      const term = safeLower(searchTerm);

      const matchesSearch = 
        companyName.includes(term) ||

    return Math.floor(diff / (1000 * 60 * 60 * 24));
  };

      case ServiceStatus.PENDING: return 'text-orange-600 bg-orange-50 border-orange-100';

     switch (grade) {

    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let width = img.width;
          let height = img.height;
          const MAX_SIZE = 1024; // Resize to max 1024px

          if (width > height) {
            if (width > MAX_SIZE) {
              height *= MAX_SIZE / width;
              width = MAX_SIZE;
            }
          } else {
            if (height > MAX_SIZE) {
              width *= MAX_SIZE / height;
              height = MAX_SIZE;
            }
          }

          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx?.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.6)); // Compress quality to 0.6
        };
        img.src = e.target?.result;
      };
      reader.readAsDataURL(file);
    });
  };

    const file = e.target.files?.[0];
    if (file) {
      try {
        const resized = await resizeImage(file);
        setAttachedImages(prev => {
          const newImages = [...prev];
          newImages[index] = resized;
          return newImages;
        });
      } catch (err) {
        console.error("Image processing error", err);
        alert("이미지 처리 중 오류가 발생했습니다.");
      }
    }
    // Reset input to allow selecting same file again
    e.target.value = '';
  };

    setAttachedImages(prev => {

        newImages[index] = null;
        return newImages;

    setServiceForm({

        date: new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Seoul' }),
        type: ServiceType.AS,
        issue: '',
        resolution: '',
        technician: '',
        priority: IssueGrade.INQUIRY,

    setAttachedImages([null, null, null]); // Reset 3 slots

    if (isAdminMode) {
        setIsServiceModalOpen(true);
    } else {
        setAuthPassword('');
        setIsAuthModalOpen(true);
    }
  };

  const handleEditService = (record) => {
      setEditingServiceId(record.id);
      setValidationErrors({});
      setServiceForm({
          machineId: record.machineId,
          date: record.date,
          type: record.type,
          issue: record.issue,
          resolution: record.resolution || '',
          technician: record.technician,
          priority: record.priority || IssueGrade.INQUIRY,
      });
      
      // Parse existing images and fill slots
      const images = getImages(record.attachmentUrl || '');
      const paddedImages = [null, null, null];
      images.forEach((img, i) => {
          if (i < 3) paddedImages[i] = img;
      });
      setAttachedImages(paddedImages);

      setIsServiceModalOpen(true);

  const handleAuthSubmit = (e) => {
    e.preventDefault();
    if (authPassword === '202603') {
        setIsAuthModalOpen(false);
        setIsServiceModalOpen(true);
    } else {
        alert('비밀번호가 올바르지 않습니다.');
    }
  };

  const handleSubmitService = async (e) => {
    e.preventDefault();

    // Validation
    const errors = {};
    if (!serviceForm.machineId) errors.machineId = true;
    if (!serviceForm.date) errors.date = true;
    if (!serviceForm.technician) errors.technician = true;
    if (!serviceForm.issue) errors.issue = true;

    if (Object.keys(errors).length > 0) {
        setValidationErrors(errors);
        alert('필수 입력 항목을 확인해주세요. (붉은색 테두리)');
        return;
    }

    const selectedMachine = company.machines.find(m => m.id === serviceForm.machineId);
    if (!selectedMachine) {
        alert("선택된 기계 정보를 찾을 수 없습니다.");
        return;
    }

    setIsSubmitting(true);

    try {
      // Join multiple images with a separator, filtering out nulls
      const combinedPhotos = attachedImages.filter(Boolean).join('|||');
      
      const basePayload = {
        date: serviceForm.date,
        type: serviceForm.type,
        issue: serviceForm.issue,
        resolution: serviceForm.resolution,
        technician: serviceForm.technician,
        priority: serviceForm.priority,
        photo: combinedPhotos
      };

      let success = false;

      if (editingServiceId) {
          // Update Mode
          success = await updateServiceInSheet({
              id: editingServiceId,
              ...basePayload
          });
          
          if (success) {
            alert("서비스 기록이 수정되었습니다.");
            const newHistory = company.serviceHistory.map(rec => {
                if (rec.id === editingServiceId) {
                    return {
                        ...rec,
                        ...basePayload,
                        machineId: serviceForm.machineId,
                        machineModel: selectedMachine.modelName,
                        attachmentUrl: combinedPhotos || undefined
                    };
                }
                return rec;
            });
            const updatedCompany = { ...company, serviceHistory: newHistory };
            onUpdateCompany(updatedCompany);
          }
      } else {
          // Create Mode
          const newId = `svc-${Date.now()}-${Math.floor(Math.random() * 1000)}`;
          
          success = await saveServiceToSheet({
            id: newId, 
            company: company.name,
            model: selectedMachine.modelName,
            serial: selectedMachine.serialNumber,
            ...basePayload
          });

          if (success) {
              const newRecord = {
                id: newId,
                ...basePayload,
                machineId: serviceForm.machineId,
                machineModel: selectedMachine.modelName,
                status: ServiceStatus.RESOLVED,
                attachmentUrl: combinedPhotos || undefined
            };
            const newHistory = [newRecord, ...company.serviceHistory];
            const updatedCompany = { ...company, serviceHistory: newHistory };
            onUpdateCompany(updatedCompany);
          }
      }

      if (success) {
         setEditingServiceId(null);
         setValidationErrors({});
         setServiceForm({
            machineId: '',
            date: new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Seoul' }),
            type: ServiceType.AS,
            issue: '',
            resolution: '',
            technician: '',
            priority: IssueGrade.INQUIRY,
         });
         setAttachedImages([null, null, null]);
         setIsServiceModalOpen(false);
      } else {
        alert("처리에 실패했습니다. 스프레드시트 네트워크 상태를 확인하거나 ID가 유효한지 확인해주세요.");
      }
    } catch (error) {
       console.error(error);
       alert("오류가 발생했습니다.");
    } finally {
        setIsSubmitting(false);
    }
  };

  const handleDeleteClick = (serviceId) => {
    setServiceToDelete(serviceId);
  };

  const confirmDelete = async () => {
    if (!serviceToDelete) return;
    
    setIsDeleting(serviceToDelete);
    try {
        const success = await deleteServiceFromSheet(serviceToDelete);
        
        if (success) {
            // UI Update
            const updatedHistory = company.serviceHistory.filter(s => s.id !== serviceToDelete);
            const updatedCompany = { ...company, serviceHistory: updatedHistory };
            onUpdateCompany(updatedCompany);
            alert('삭제되었습니다.');
            setIsServiceModalOpen(false); // Close modal if open
            setServiceToDelete(null);
        } else {
            alert("삭제에 실패했습니다. 해당 ID를 찾을 수 없거나 네트워크 오류입니다.");
        }
    } catch (error) {
        console.error("Delete failed", error);
        alert("삭제 처리 중 오류가 발생했습니다.");
    } finally {
        setIsDeleting(null);
    }
  };

      }
    } catch (error) {
      console.error("Error deleting machine:", error);

  const handleExportCSV = () => {
    const recordsToExport = company.serviceHistory.filter(r => 
      exportSelectedMachineIds.includes(r.machineId)

    if (recordsToExport.length === 0) {
      alert('선택한 기계의 서비스 이력이 없습니다.');
      return;
    }

    // CSV Header
    let csvContent = '\uFEFF'; // BOM for Excel Korean support
    csvContent += "Date,Type,Machine Model,Serial Number,Technician,Grade,Issue,Resolution\n";

    recordsToExport.forEach(record => {
      const machine = company.machines.find(m => m.id === record.machineId);
      const row = [
        record.date,
        record.type,
        `"${record.machineModel.replace(/"/g, '""')}"`,
        `"${machine?.serialNumber || ''}"`,
        `"${record.technician}"`,
        record.priority || '',
        `"${record.issue.replace(/"/g, '""').replace(/\n/g, ' ')}"`,
        `"${(record.resolution || '').replace(/"/g, '""').replace(/\n/g, ' ')}"`
      ].join(",");
      csvContent += row + "\n";
    });

    const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
    const link = document.createElement("a");
    if (link.download !== undefined) {
      const url = URL.createObjectURL(blob);
      link.setAttribute("href", url);
      link.setAttribute("download", `${company.name.replace(/ /g, '_')}_Service_History.csv`);
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
    setIsExportModalOpen(false);
  };

               >
                 <Plus size={14} className="mr-1.5"/> 서비스 <span className="hidden xs:inline">추가</span>
               </button>
             )}
          </div>
        </div>

        {/* Company Info Card */}

    <div className="min-h-screen bg-gray-50 text-gray-900 font-sans">
      {/* Header */}
      <header className="bg-white border-b border-gray-200 sticky top-0 z-30 shadow-sm">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
          <div className="flex items-center gap-2 cursor-pointer" onClick={handleBackToDashboard}>
            <div className="bg-blue-600 text-white p-1.5 rounded-lg shadow-sm shadow-blue-200">
               <Cloud size={20} className="stroke-[2.5px]" />
            </div>
            <h1 className="text-lg font-bold text-gray-900 tracking-tight">
              Service<span className="text-blue-600">Manager</span>
            </h1>
          </div>
          
          <div className="flex items-center gap-3">
            <button 
              onClick={loadData} 
              className="p-2 text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded-full transition-all"
              title="새로고침"
            >
              <RefreshCw size={18} className={isLoading ? 'animate-spin text-blue-600' : ''} />
            </button>

            <div className="h-4 w-px bg-gray-200 mx-1"></div>

            {isAdminMode ? (
              <div className="flex items-center gap-3 animate-fade-in">
                <span className="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-full border border-blue-100 flex items-center">
                  <Lock size={10} className="mr-1"/> 관리자 모드
                </span>
                <button 
                  onClick={handleLogout}
                  className="text-xs font-medium text-gray-500 hover:text-gray-700 underline decoration-gray-300 underline-offset-2"
                >
                  나가기
                </button>
              </div>
            ) : (
              <button 
                onClick={() => setIsAuthModalOpen(true)}
                className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-full transition-colors"
              >
                <Lock size={12} />
                <span>관리자</span>
              </button>
            )}
          </div>
        </div>
      </header>

      {/* Main Content */}
      <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        {error && (
          <div className="mb-6 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl flex items-center shadow-sm animate-fade-in">
            <AlertCircle size={20} className="mr-2 flex-shrink-0" />
            <span className="text-sm font-medium">{error}</span>
            <button onClick={() => setError(null)} className="ml-auto text-red-400 hover:text-red-600"><X size={16}/></button>
          </div>
        )}

        {isLoading && !companies.length ? (
          <div className="flex flex-col items-center justify-center h-[60vh] animate-pulse">
            <div className="relative">
                <div className="w-16 h-16 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin"></div>
                <div className="absolute inset-0 flex items-center justify-center">
                    <Cloud size={20} className="text-blue-600" />
                </div>
            </div>
            <p className="mt-4 text-gray-500 font-medium text-sm">데이터를 불러오는 중입니다...</p>
          </div>
        ) : (
          <>
            {activeTab === 'dashboard' && (
              <div className="animate-fade-in">
                 <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-6 gap-4">
                    <div>
                        <h2 className="text-2xl font-bold text-gray-900">대시보드</h2>
                        <p className="text-sm text-gray-500 mt-1">전체 현황을 한눈에 확인하세요.</p>
                    </div>
                    <div className="flex gap-2">
                        {isAdminMode && (
                            <button 
                                onClick={() => setIsNewInstallModalOpen(true)}
                                className="flex items-center justify-center px-4 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all transform hover:-translate-y-0.5 font-medium text-sm"
                            >
                                <Plus size={16} className="mr-1.5" />
                                신규 설치 등록
                            </button>
                        )}
                        <button 
                            onClick={() => setActiveTab('statistics')}
                            className="flex items-center justify-center px-4 py-2 bg-white text-gray-700 border border-gray-200 rounded-xl hover:bg-gray-50 hover:border-blue-300 hover:text-blue-600 shadow-sm transition-all font-medium text-sm"
                        >
                            <BarChart2 size={16} className="mr-1.5" />
                            통계
                        </button>
                    </div>
                 </div>

                 <Dashboard 
                   companies={companies} 
                   onCompanyClick={handleCompanyClick} 
                   monthlySchedules={monthlySchedules}
                 />
              </div>
            )}

            {activeTab === 'detail' && selectedCompany && (
              <ClientDetail 
                company={selectedCompany} 
                onBack={handleBackToDashboard}
                onUpdateCompany={handleUpdateCompany}
                isAdminMode={isAdminMode}
                monthlySchedules={monthlySchedules}
              />
            )}

            {activeTab === 'statistics' && (
                <div className="animate-fade-in">
                    <div className="flex items-center mb-6">
                        <button onClick={() => setActiveTab('dashboard')} className="mr-4 p-2 hover:bg-gray-100 rounded-full transition-colors">
                            <ArrowLeft size={20} className="text-gray-600"/>
                        </button>
                        <div>
                            <h2 className="text-2xl font-bold text-gray-900">통계 및 분석</h2>
                            <p className="text-sm text-gray-500 mt-1">서비스 데이터를 분석합니다.</p>
                        </div>
                    </div>
                    <Statistics companies={companies} />
                </div>
            )}
          </>
        )}
      </main>

      {/* Admin Auth Modal */}
      {isAuthModalOpen && (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm animate-fade-in p-4">
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden animate-fade-in-up">
            <div className="flex items-center justify-between px-6 py-4 border-b border-gray-100 bg-gray-50">
              <h3 className="text-lg font-bold text-gray-900 flex items-center"><Lock size={18} className="mr-2 text-blue-600"/>관리자 인증</h3>
              <button onClick={() => setIsAuthModalOpen(false)} className="text-gray-400 hover:text-gray-600"><X size={20} /></button>
            </div>
            <form onSubmit={handleAdminAuth} className="p-6">
               <div className="mb-5">
                 <label className="block text-sm font-medium text-gray-700 mb-1.5">비밀번호</label>
                 <input 
                    type="password" 
                    value={authPassword} 
                    onChange={(e) => setAuthPassword(e.target.value)} 
                    className="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" 
                    placeholder="비밀번호를 입력하세요"
                    autoFocus
                  />
               </div>
               <button type="submit" className="w-full px-4 py-2.5 text-white bg-blue-600 rounded-xl hover:bg-blue-700 font-medium shadow-lg shadow-blue-100 transition-all">인증하기</button>
            </form>
          </div>
        </div>
      )}

      {/* New Installation Modal */}
      <NewInstallationModal 
        isOpen={isNewInstallModalOpen}
        onClose={() => setIsNewInstallModalOpen(false)}
        onSave={handleSaveNewInstallation}
      />
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

    </script>
</body>
</html>
